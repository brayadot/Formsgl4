<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gal4ctcos — Aplicações Staff</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #08080f;
      --bg2: #0e0e1a;
      --purple: #7c3aed;
      --purple-light: #a855f7;
      --purple-glow: #c084fc;
      --accent: #e879f9;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --card-bg: #12121f;
      --border: rgba(124, 58, 237, 0.3);
      --open: #22c55e;
      --closed: #475569;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Stars background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(168,85,247,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 60%, rgba(168,85,247,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 40%, rgba(232,121,249,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 50%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 70%, rgba(168,85,247,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 90%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 35%, rgba(232,121,249,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 65%, rgba(255,255,255,0.4) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Nebula glow */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 900px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(124,58,237,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* HEADER */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(8, 8, 15, 0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 48px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
    }

    .logo-text {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 1.2rem;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, var(--purple-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 36px;
    }

    nav a {
      font-family: 'Orbitron', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    nav a:hover, nav a.active { color: var(--purple-light); }

    .btn-entrar {
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--purple), var(--accent));
      color: #fff;
      border: none;
      padding: 10px 22px;
      cursor: pointer;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn-entrar:hover { opacity: 0.85; transform: scale(1.03); }

    /* HERO */
    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 80px 24px 60px;
    }

    .hero-tag {
      display: inline-block;
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--purple-light);
      border: 1px solid var(--border);
      padding: 6px 18px;
      margin-bottom: 24px;
      position: relative;
    }

    .hero-tag::before, .hero-tag::after {
      content: '◆';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.4rem;
      color: var(--accent);
    }
    .hero-tag::before { left: -12px; }
    .hero-tag::after { right: -12px; }

    .hero h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      letter-spacing: 0.05em;
      line-height: 1.1;
      margin-bottom: 16px;
    }

    .hero h1 span {
      background: linear-gradient(135deg, var(--purple-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      font-size: 1.1rem;
      color: var(--text-muted);
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* GRID */
    .section {
      position: relative;
      z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px 32px 80px;
    }

    .section-title {
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--purple-light);
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, var(--border), transparent);
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    /* CARD */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.3s, transform 0.3s;
      animation: fadeUp 0.6s both;
    }

    .card:hover {
      border-color: var(--purple-light);
      transform: translateY(-4px);
    }

    /* corner decoration */
    .card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 40px; height: 40px;
      background: linear-gradient(225deg, var(--purple) 0%, transparent 60%);
      pointer-events: none;
    }

    .card-banner {
      position: relative;
      height: 160px;
      background: linear-gradient(135deg, #1a0533, #2d1060);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card-banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 50%, rgba(124,58,237,0.35) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 30%, rgba(232,121,249,0.2) 0%, transparent 50%);
    }

    .card-banner-icon {
      font-size: 3.5rem;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 0 18px var(--purple-glow));
      animation: float 4s ease-in-out infinite;
    }

    .card-banner-title {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      font-family: 'Orbitron', monospace;
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 0 20px var(--purple);
      padding: 10px 16px;
      background: linear-gradient(to top, rgba(8,8,15,0.9), transparent);
    }

    .card-body {
      padding: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card-requisitos-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.05em;
    }

    .card-requisitos {
      list-style: none;
      border-left: 2px solid var(--purple);
      padding-left: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card-requisitos li {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .card-requisitos li::before {
      content: '› ';
      color: var(--purple-light);
    }

    .card-obs {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-style: italic;
      line-height: 1.5;
    }

    .card-footer {
      padding: 0 20px 20px;
    }

    /* STATUS TOGGLE BUTTON */
    .btn-status {
      width: 100%;
      padding: 13px;
      font-family: 'Orbitron', monospace;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }

    .btn-status.open {
      background: linear-gradient(135deg, var(--purple), var(--accent));
      color: #fff;
      box-shadow: 0 0 20px rgba(124,58,237,0.5);
    }

    .btn-status.open:hover {
      box-shadow: 0 0 30px rgba(168,85,247,0.7);
      transform: scale(1.02);
    }

    .btn-status.closed {
      background: var(--closed);
      color: rgba(255,255,255,0.5);
      cursor: not-allowed;
    }

    .btn-status::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent);
      pointer-events: none;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 3px 10px;
      border-radius: 2px;
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 2;
    }

    .badge.open {
      background: rgba(34,197,94,0.15);
      border: 1px solid rgba(34,197,94,0.4);
      color: var(--open);
    }

    .badge.closed {
      background: rgba(71,85,105,0.3);
      border: 1px solid rgba(71,85,105,0.5);
      color: var(--text-muted);
    }

    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }

    .badge.open .badge-dot { background: var(--open); box-shadow: 0 0 6px var(--open); }
    .badge.closed .badge-dot { background: var(--text-muted); }

    /* ADMIN PANEL */
    .admin-toggle {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 200;
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: rgba(124,58,237,0.2);
      border: 1px solid var(--border);
      color: var(--purple-light);
      padding: 10px 18px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.2s;
    }

    .admin-toggle:hover {
      background: rgba(124,58,237,0.4);
      border-color: var(--purple-light);
    }

    .admin-panel {
      position: fixed;
      bottom: 80px;
      right: 28px;
      z-index: 200;
      background: rgba(14,14,26,0.97);
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
      padding: 20px;
      min-width: 280px;
      display: none;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 0 40px rgba(124,58,237,0.2);
    }

    .admin-panel.visible { display: flex; }

    .admin-panel-title {
      font-family: 'Orbitron', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--purple-light);
      margin-bottom: 6px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .admin-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .admin-row span {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 46px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle input { display: none; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--closed);
      cursor: pointer;
      transition: 0.3s;
      border-radius: 2px;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      left: 3px;
      top: 3px;
      width: 18px;
      height: 18px;
      background: rgba(255,255,255,0.5);
      transition: 0.3s;
    }

    .toggle input:checked + .toggle-slider {
      background: linear-gradient(135deg, var(--purple), var(--accent));
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(22px);
      background: #fff;
    }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.1s; }
    .card:nth-child(3) { animation-delay: 0.15s; }
    .card:nth-child(4) { animation-delay: 0.2s; }
    .card:nth-child(5) { animation-delay: 0.25s; }
    .card:nth-child(6) { animation-delay: 0.3s; }
    .card:nth-child(7) { animation-delay: 0.35s; }

    /* FOOTER */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 28px;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    footer span {
      color: var(--purple-light);
    }

    @media (max-width: 600px) {
      header { padding: 0 20px; }
      .section { padding: 16px 16px 60px; }
      nav { gap: 20px; }
      .cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="20,2 38,12 38,28 20,38 2,28 2,12" fill="none" stroke="url(#hexgrad)" stroke-width="1.5"/>
      <circle cx="20" cy="20" r="7" fill="url(#hexgrad)" opacity="0.9"/>
      <circle cx="20" cy="20" r="10" fill="none" stroke="url(#hexgrad)" stroke-width="0.8" stroke-dasharray="3 2"/>
      <defs>
        <linearGradient id="hexgrad" x1="0" y1="0" x2="40" y2="40">
          <stop offset="0%" stop-color="#a855f7"/>
          <stop offset="100%" stop-color="#e879f9"/>
        </linearGradient>
      </defs>
    </svg>
    <span class="logo-text">GAL4CTCOS</span>
  </div>

  <nav>
    <a href="#">Home</a>
    <a href="#" class="active">Aplicações</a>
    <a href="#">Sair</a>
  </nav>

  <button class="btn-entrar">Entrar</button>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-tag">Recrutamento Staff</div>
  <h1>Faça parte do<br/><span>time Gal4ctcos</span></h1>
  <p>Confira os cargos disponíveis e candidate-se. Vagas abertas por tempo limitado.</p>
</section>

<!-- CARDS -->
<section class="section">
  <div class="section-title">Cargos disponíveis</div>

  <div class="cards-grid" id="cardsGrid"></div>
</section>

<footer>
  &copy; 2026 <span>Gal4ctcos</span> — Todos os direitos reservados.
</footer>

<!-- ADMIN BUTTON -->
<button class="admin-toggle" onclick="toggleAdmin()">⚙ Admin</button>

<div class="admin-panel" id="adminPanel">
  <div class="admin-panel-title">⚙ Gerenciar Vagas</div>
  <div id="adminRows"></div>
</div>

<script>
  const cargos = [
    {
      id: 'moderador',
      nome: 'Moderador',
      icon: '🛡️',
      requisitos: [
        'Ter no mínimo 14 anos',
        'Bom domínio da escrita',
        'Ser responsável e maduro',
        'Possuir no mínimo 100 mensagens',
        'Boa conduta no servidor',
      ],
      obs: 'Para se candidatar, clique no botão abaixo para acessar o formulário.',
      link: '#', // substitua pelo link do formulário
      aberto: true,
    },
    {
      id: 'designer',
      nome: 'Designer',
      icon: '🎨',
      requisitos: [
        'Ter no mínimo 14 anos',
        'Experiência com edição de imagens',
        'Conhecimento em ferramentas como Canva, Photoshop ou similar',
        'Criatividade e atenção aos detalhes',
      ],
      obs: 'Para se candidatar, clique no botão abaixo para acessar o formulário.',
      link: '#',
      aberto: true,
    },
    {
      id: 'auxiliar',
      nome: 'Auxiliar',
      icon: '🤝',
      requisitos: [
        'Ter no mínimo 13 anos',
        'Disposição para ajudar membros',
        'Ser comunicativo e prestativo',
        'Boa conduta no servidor',
      ],
      obs: 'Para se candidatar, clique no botão abaixo para acessar o formulário.',
      link: '#',
      aberto: false,
    },
    {
      id: 'recrutador',
      nome: 'Recrutador',
      icon: '🔍',
      requisitos: [
        'Ter no mínimo 15 anos',
        'Habilidade de avaliar candidatos',
        'Boa comunicação e imparcialidade',
        'Possuir no mínimo 200 mensagens',
      ],
      obs: 'Para se candidatar, clique no botão abaixo para acessar o formulário.',
      link: '#',
      aberto: false,
    },
    {
      id: 'eventos',
      nome: 'Organizador de Eventos',
      icon: '🎉',
      requisitos: [
        'Ter no mínimo 14 anos',
        'Criatividade para criar e organizar eventos',
        'Ser proativo e pontual',
        'Boa conduta no servidor',
      ],
      obs: 'Para se candidatar, clique no botão abaixo para acessar o formulário.',
      link: '#',
      aberto: true,
    },
    {
      id: 'redessociais',
      nome: 'Redes Sociais',
      icon: '📲',
      requisitos: [
        'Ter no mínimo 16 anos',
        'Habilidade de gerenciar redes sociais',
        'Criatividade para criação de conteúdo',
        'Ser responsável e maduro',
      ],
      obs: 'Para se candidatar, clique no botão abaixo para acessar o formulário.',
      link: '#',
      aberto: false,
    },
    {
      id: 'competitivo',
      nome: 'Organizador Competitivo',
      icon: '🏆',
      requisitos: [
        'Ter no mínimo 15 anos',
        'Conhecimento em torneios e campeonatos',
        'Ser organizado e imparcial',
        'Possuir no mínimo 150 mensagens',
      ],
      obs: 'Para se candidatar, clique no botão abaixo para acessar o formulário.',
      link: '#',
      aberto: true,
    },
  ];

  // Load state from localStorage
  cargos.forEach(c => {
    const saved = localStorage.getItem('status_' + c.id);
    if (saved !== null) c.aberto = saved === 'true';
  });

  function renderCards() {
    const grid = document.getElementById('cardsGrid');
    grid.innerHTML = cargos.map(c => `
      <div class="card" id="card_${c.id}">
        <div class="badge ${c.aberto ? 'open' : 'closed'}">
          <div class="badge-dot"></div>
          ${c.aberto ? 'Aberto' : 'Fechado'}
        </div>
        <div class="card-banner">
          <div class="card-banner-icon">${c.icon}</div>
          <div class="card-banner-title">${c.nome}</div>
        </div>
        <div class="card-body">
          <div class="card-requisitos-title">Requisitos para ${c.nome}:</div>
          <ul class="card-requisitos">
            ${c.requisitos.map(r => `<li>${r}</li>`).join('')}
          </ul>
          <p class="card-obs">${c.obs}</p>
        </div>
        <div class="card-footer">
          <button
            class="btn-status ${c.aberto ? 'open' : 'closed'}"
            onclick="${c.aberto ? `window.open('${c.link}', '_blank')` : ''}"
          >
            ${c.aberto ? '✦ Candidatar-se' : 'Vagas Fechadas'}
          </button>
        </div>
      </div>
    `).join('');
  }

  function renderAdmin() {
    const rows = document.getElementById('adminRows');
    rows.innerHTML = cargos.map(c => `
      <div class="admin-row">
        <span>${c.nome}</span>
        <label class="toggle">
          <input type="checkbox" ${c.aberto ? 'checked' : ''} onchange="toggleCargo('${c.id}', this.checked)"/>
          <span class="toggle-slider"></span>
        </label>
      </div>
    `).join('');
  }

  function toggleCargo(id, aberto) {
    const cargo = cargos.find(c => c.id === id);
    if (cargo) {
      cargo.aberto = aberto;
      localStorage.setItem('status_' + id, aberto);
      renderCards();
    }
  }

  function toggleAdmin() {
    const panel = document.getElementById('adminPanel');
    panel.classList.toggle('visible');
    renderAdmin();
  }

  renderCards();
</script>
</body>
</html>
